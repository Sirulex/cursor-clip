name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v5.0.4

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag cursor-clip:$(date +%s)
